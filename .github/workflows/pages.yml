name: Publish GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html _site/index.html
          cp -R docs _site/docs
          cp README.md _site/README.md
          cp CONCEPT_BRIEF.md _site/CONCEPT_BRIEF.md
          cp INFRASTRUCTURE.md _site/INFRASTRUCTURE.md
          cp PI.md _site/PI.md
          cp PLAN.claude-opus-4-8.md _site/PLAN.claude-opus-4-8.md
          cp PLAN.gpt-5.5.md _site/PLAN.gpt-5.5.md
          cp PLAN_REPORT.html _site/PLAN_REPORT.html
          cp AB_TEST_FRAMEWORK.md _site/AB_TEST_FRAMEWORK.md
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
