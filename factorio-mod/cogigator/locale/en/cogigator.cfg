[command-help]
cogigator-cmd-status-help=Print current experiment, active variant, and registry counts.
cogigator-cmd-variant-help=Switch the active variant at runtime. Usage: /cogigator-variant <variant-id>. Known variants: cognition-flow, capacity-vector.
cogigator-cmd-experiment-help=Print the full descriptor for the currently active variant.
cogigator-cmd-snapshot-help=Request a snapshot from the active Cogigator station (stub — available after Tasks 004/005 are implemented).

