[mod-setting-name]
cogigator-active-variant=Cogigator active variant
cogigator-permission-mode=Cogigator permission mode
cogigator-entity-cap=Cogigator entity snapshot cap

[mod-setting-description]
cogigator-active-variant=Choose which Cogigator variant is active for this save.\n• cognition-flow — Variant A (Sightline + Cognition Flow, inspired by Claude).\n• capacity-vector — Variant B (Field Station + Capacity Vector, inspired by GPT).
cogigator-permission-mode=Controls what actions the Cogigator may take.\nOnly read-only-advisor and silent-monitor are valid during the spike — mutating tiers are disabled.
cogigator-entity-cap=Maximum number of representative entities included in a snapshot (1–256). Higher values give more detail but increase payload size.

[entity-name]
cogigator-field-station=Cogigator Field Station
cogigator-cognition-processor=Cognition Processor
cogigator-memory-bank=Memory Bank
cogigator-planning-relay=Planning Relay

[entity-description]
cogigator-field-station=Read-only observation anchor for a local factory cell. Adds sight/scan coverage to the Cognition Network.
cogigator-cognition-processor=Read-only synthesis shell for manufactured attention and cognition flow.
cogigator-memory-bank=Read-only synthesis shell for retained observations and confidence.
cogigator-planning-relay=Read-only synthesis shell for future planning advice. It does not execute changes.

